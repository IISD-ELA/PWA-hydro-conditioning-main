name: tests

on:
  push:
    branches: ["main", "dev", "ci/**"]
  pull_request:
    branches: ["main", "dev"]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

# The orchestrator's re-export test does `import pwa`, which needs all three
# step packages. Those live in separate private repos and are not on PyPI, so
# running the suite here would require checking them out with a cross-repo PAT
# — an unwanted person/credential dependency. Instead we only verify that the
# package builds (sdist + wheel) from its pyproject. The actual step logic is
# tested in its own repos (pwa-tools, pwa-raven, pwa-calibration).
jobs:
  build:
    name: build package (py3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        # `python -m build` builds the distribution from pyproject without
        # installing the (unpublished) runtime dependencies, so no sibling
        # repos or secrets are needed.
        run: |
          python -m pip install --upgrade pip build
          python -m build
